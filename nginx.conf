# nginx add_header gotcha: directives at server level are *not* inherited by
# location blocks that have their own add_header. So we have to repeat the
# security headers in each location block. The CSP block is identical between
# them; the only difference is Cache-Control.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text responses — drops the 7 MB GeoJSON to ~1.5 MB on the wire.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    location ~ ^/(vendor|data)/ {
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tiles.openfreemap.org; connect-src 'self' https://tiles.openfreemap.org; worker-src 'self' blob:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        try_files $uri =404;
    }

    # Same-origin reverse proxy to the internal Guinness backend container.
    # Keeps the browser on this origin, so CSP connect-src 'self' already covers
    # it (no CSP change, no CORS). The variable + resolver defers DNS so nginx
    # still starts if the backend is briefly down; X-Forwarded-For is overwritten
    # (not appended) so the backend can trust it for per-IP rate limiting.
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $guinness_upstream http://guinness:8000;
        proxy_pass $guinness_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tiles.openfreemap.org; connect-src 'self' https://tiles.openfreemap.org; worker-src 'self' blob:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        try_files $uri $uri/ =404;
    }
}
