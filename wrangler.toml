# Cloudflare Pages config: static site at the repo root + the Guinness Pages
# Function (functions/api/guinness/[[path]].js), backed by D1.
#
# This repo is a *Pages* project (Git-connected, auto-deploys on push to main).
# Because a wrangler.toml is present, Cloudflare manages bindings from HERE and
# disables the dashboard "Add binding" button — so the D1 binding lives below.
name = "pubcrawl-nl"
compatibility_date = "2024-11-01"
pages_build_output_dir = "."

# Guinness votes database. The votes table is created automatically on first use,
# so running functions/schema.sql is optional. Local dev: npx wrangler pages dev . --d1 DB
[[d1_databases]]
binding = "DB"
database_name = "pubcrawl-guinness"
database_id = "5e0b795f-50ec-47ae-af79-179f8fd6985e"
